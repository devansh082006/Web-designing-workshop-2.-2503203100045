<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Clone</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="sidebar">
        <div class="header">
            <h2>WhatsApp</h2>
        </div>

        <div class="search">
            <input type="text" placeholder="Search chats">
        </div>

        <div class="chat-list">
            <div class="chat">
                <img src="https://i.pravatar.cc/50" alt="">
                <div>
                    <h4>John</h4>
                    <p>Hello!</p>
                </div>
            </div>

            <div class="chat">
                <img src="https://i.pravatar.cc/51" alt="">
                <div>
                    <h4>Alex</h4>
                    <p>How are you?</p>
                </div>
            </div>

            <div class="chat">
                <img src="https://i.pravatar.cc/52" alt="">
                <div>
                    <h4>Emma</h4>
                    <p>Let's meet.</p>
                </div>
            </div>
        </div>
    </div>

    <div class="chat-area">

        <div class="chat-header">
            <img src="https://i.pravatar.cc/50" alt="">
            <h3>John</h3>
        </div>

        <div class="messages" id="messages">
            <div class="message received">
                Hi there!
            </div>

            <div class="message sent">
                Hello!
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type a message">
            <button onclick="sendMessage()">Send</button>
        </div>

    </div>

</div>

<script src="script.js"></script>
</body>
</html>
